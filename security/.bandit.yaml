# Bandit Configuration — Rams @Elec Intelligence Platform
# https://bandit.readthedocs.io/en/latest/config.html

# Directories to exclude from scanning
exclude_dirs:
  - tests/
  - venv/
  - .venv/
  - __pycache__/
  - node_modules/
  - .git/
  - data/

# Tests to skip with justification
skips:
  - B101   # assert_used — used in test files only (excluded above)
  - B104   # hardcoded_bind_all_interfaces — intentional for Docker containers
  - B311   # random — not used for cryptographic purposes
  - B404   # import_subprocess — Airflow/n8n legitimately use subprocess

# Severity filter: only report MEDIUM and above
severity_filter: medium

# Confidence filter: only report MEDIUM and above
confidence_filter: medium
