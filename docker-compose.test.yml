services:
  postgres-test:
    image: postgres:15-alpine
    container_name: rams-elec-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rams_elec_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  triage-test:
    build:
      context: ./services/triage
      dockerfile: Dockerfile
    container_name: rams-elec-triage-test
    ports:
      - "8011:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-test:5432/rams_elec_test
      - GROQ_API_KEY=test_key
      - TRIAGE_PORT=8001
    depends_on:
      postgres-test:
        condition: service_healthy

  loadshedding-test:
    build:
      context: ./services/loadshedding
      dockerfile: Dockerfile
    container_name: rams-elec-loadshedding-test
    ports:
      - "8022:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-test:5432/rams_elec_test
      - ESKOM_SE_PUSH_API_KEY=test_key
      - LOADSHEDDING_PORT=8002
    depends_on:
      postgres-test:
        condition: service_healthy
